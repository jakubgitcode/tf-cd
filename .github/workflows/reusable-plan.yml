# ==================================================
# Reusable Workflow: Terraform Plan
# ==================================================
# Centralne repo CD — wywoływany przez repozytoria z kodem Terraform.
# Wykonuje: init → plan → upload artifact → job summary
#
# Wywołanie:
#   uses: TWOJA-ORG/przyklad_blok4_drugie_cd/.github/workflows/reusable-plan.yml@main
#   with:
#     environment: dev
#     working_directory: ./infra
#     tfvars_file: environments/dev.tfvars
#     backend_key: myproject/dev.terraform.tfstate
#   secrets: inherit    # lub jawne sekrety

name: 'Reusable — Terraform Plan'

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment name (dev, test, prod)'
        required: true
        type: choice
        options:
          - dev
          - test
          - prod
      working_directory:
        description: 'Ścieżka do katalogu Terraform (np. ./infra)'
        required: true
        type: string
        default: './infra'
      tfvars_file:
        description: 'Ścieżka do pliku tfvars'
        required: true
        type: string
        default: 'environments/dev.tfvars'
      backend_key:
        description: 'Klucz state w backendzie'
        required: true
        type: string
      terraform_version:
        description: 'Wersja Terraform'
        required: false
        type: string
        default: 'latest'
      source_repository:
        description: 'Repository with Terraform code (owner/repo). Empty = current/caller repo.'
        required: false
        type: string
        default: ''
      source_ref:
        description: 'Git ref in source_repository. Empty = current ref.'
        required: false
        type: string
        default: ''
      use_oidc:
        description: 'Use OIDC auth (true) or SPN client secret (false)'
        required: false
        type: boolean
        default: false

  workflow_call:
    inputs:
      environment:
        description: 'Target environment name (dev, test, prod)'
        required: true
        type: string
      working_directory:
        description: 'Ścieżka do katalogu Terraform (np. ./infra)'
        required: true
        type: string
      tfvars_file:
        description: 'Ścieżka do pliku tfvars (relative to working_directory)'
        required: true
        type: string
      backend_key:
        description: 'Klucz state w backendzie (np. myapp/dev.terraform.tfstate)'
        required: true
        type: string
      terraform_version:
        description: 'Wersja Terraform (opcjonalna, default: latest)'
        required: false
        type: string
        default: 'latest'
      source_repository:
        description: 'Repository with Terraform code (owner/repo). Empty = current/caller repo.'
        required: false
        type: string
        default: ''
      source_ref:
        description: 'Git ref in source_repository. Empty = current ref.'
        required: false
        type: string
        default: ''
      use_oidc:
        description: 'Use OIDC auth (true) or SPN client secret (false)'
        required: false
        type: boolean
        default: false
    outputs:
      plan_exit_code:
        description: 'Exit code: 0=no changes, 1=error, 2=changes detected'
        value: ${{ jobs.plan.outputs.exit_code }}
      has_changes:
        description: 'Czy plan wykrył zmiany (true/false)'
        value: ${{ jobs.plan.outputs.has_changes }}
    secrets:
      AZURE_CLIENT_ID:
        required: false
      AZURE_CLIENT_SECRET:
        required: false
      AZURE_SUBSCRIPTION_ID:
        required: false
      AZURE_TENANT_ID:
        required: false
      ARM_CLIENT_ID:
        required: false
      ARM_CLIENT_SECRET:
        required: false
      ARM_SUBSCRIPTION_ID:
        required: false
      ARM_TENANT_ID:
        required: false
      SOURCE_REPO_TOKEN:
        required: false

permissions:
  id-token: write
  contents: read

jobs:
  test-credentials:
    name: '🔐 Test Azure Credentials'
    runs-on: ubuntu-latest
    steps:
      - name: Validate Auth Inputs
        run: |
          CLIENT_ID="${{ secrets.AZURE_CLIENT_ID || secrets.ARM_CLIENT_ID }}"
          SUBSCRIPTION_ID="${{ secrets.AZURE_SUBSCRIPTION_ID || secrets.ARM_SUBSCRIPTION_ID }}"
          TENANT_ID="${{ secrets.AZURE_TENANT_ID || secrets.ARM_TENANT_ID }}"
          CLIENT_SECRET="${{ secrets.AZURE_CLIENT_SECRET || secrets.ARM_CLIENT_SECRET }}"
          echo "TEST_ID=${{ vars.TEST_ID }}"

          if [ -z "$CLIENT_ID" ] || [ -z "$SUBSCRIPTION_ID" ] || [ -z "$TENANT_ID" ]; then
            echo "Missing required credentials: client/subscription/tenant id"
            exit 1
          fi

          if [ "${{ inputs.use_oidc }}" = "false" ] && [ -z "$CLIENT_SECRET" ]; then
            echo "Client secret is required when use_oidc=false"
            exit 1
          fi

      - name: Azure Login Test (OIDC)
        if: ${{ inputs.use_oidc == true }}
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID || secrets.ARM_CLIENT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID || secrets.ARM_SUBSCRIPTION_ID }}
          # allow-no-subscriptions: true
          tenant-id: ${{ secrets.AZURE_TENANT_ID || secrets.ARM_TENANT_ID }}

      - name: Azure Login Test (SPN)
        if: ${{ inputs.use_oidc == false }}
        uses: azure/login@v3
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID || secrets.ARM_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET || secrets.ARM_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID || secrets.ARM_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID || secrets.ARM_TENANT_ID }}"}'
    continue-on-error: true

  plan:
    name: 'Plan (${{ inputs.environment }})'
    runs-on: ubuntu-latest
    outputs:
      exit_code: ${{ steps.plan.outputs.exit_code }}
      has_changes: ${{ steps.plan.outputs.has_changes }}
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    env:
      ARM_CLIENT_ID: "${{ secrets.AZURE_CLIENT_ID || secrets.ARM_CLIENT_ID }}"
      ARM_SUBSCRIPTION_ID: "${{ secrets.AZURE_SUBSCRIPTION_ID || secrets.ARM_SUBSCRIPTION_ID }}"
      ARM_TENANT_ID: "${{ secrets.AZURE_TENANT_ID || secrets.ARM_TENANT_ID }}"

    steps:
      - name: Checkout source repo (current/caller)
        if: ${{ inputs.source_repository == '' || inputs.source_repository == github.repository }}
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_ref || github.ref_name }}

      - name: Checkout source repo (cross-repo)
        if: ${{ inputs.source_repository != '' && inputs.source_repository != github.repository }}
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.source_repository }}
          ref: ${{ inputs.source_ref || 'main' }}
          token: ${{ secrets.SOURCE_REPO_TOKEN || github.token }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform_version }}
          terraform_wrapper: false

      - name: Configure Terraform Auth Env
        run: |
          if [ "${{ inputs.use_oidc }}" = "true" ]; then
            echo "ARM_USE_OIDC=true" >> "$GITHUB_ENV"
          else
            echo "ARM_CLIENT_SECRET=${{ secrets.AZURE_CLIENT_SECRET || secrets.ARM_CLIENT_SECRET }}" >> "$GITHUB_ENV"
            echo "ARM_USE_OIDC=false" >> "$GITHUB_ENV"
          fi

      - name: Terraform Init
        run: terraform init -backend-config="key=${{ inputs.backend_key }}"

      - name: Terraform Plan
        id: plan
        run: |
          set +e
          terraform plan \
            -detailed-exitcode \
            -no-color \
            -var-file=${{ inputs.tfvars_file }} \
            -out=${{ inputs.environment }}.tfplan \
            2>&1 | tee plan_output.txt
          PLAN_EXIT=${PIPESTATUS[0]}
          echo "exit_code=${PLAN_EXIT}" >> "$GITHUB_OUTPUT"

          if [ $PLAN_EXIT -eq 0 ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          elif [ $PLAN_EXIT -eq 2 ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Plan Summary
        if: always()
        run: |
          EXIT="${{ steps.plan.outputs.exit_code }}"
          STATUS="✅ No changes"
          [ "$EXIT" = "2" ] && STATUS="📝 Changes detected"
          [ "$EXIT" = "1" ] && STATUS="❌ Error"

          echo "## 📋 Terraform Plan — ${{ inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Parametr | Wartość |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| Środowisko | \`${{ inputs.environment }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${STATUS} |" >> $GITHUB_STEP_SUMMARY
          echo "| Exit code | \`${EXIT}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend key | \`${{ inputs.backend_key }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```hcl' >> $GITHUB_STEP_SUMMARY
          tail -30 plan_output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload Plan Artifact
        if: steps.plan.outputs.exit_code != '1'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ inputs.environment }}-${{ github.sha }}
          path: |
            ${{ inputs.working_directory }}/${{ inputs.environment }}.tfplan
            ${{ inputs.working_directory }}/plan_output.txt
          retention-days: 7

      - name: Fail on error
        if: steps.plan.outputs.exit_code == '1'
        run: exit 1
