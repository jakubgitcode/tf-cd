# ==================================================
# Reusable Workflow: Terraform Apply
# ==================================================
# Centralne repo CD — wywoływany TYLKO po sukcesie planu.
# Pobiera artifact z planem i wykonuje apply.
#
# Wywołanie:
#   uses: TWOJA-ORG/przyklad_blok4_drugie_cd/.github/workflows/reusable-apply.yml@main
#   with:
#     environment: dev
#     github_environment: production     # opcjonalnie: z approval
#     working_directory: ./infra
#     backend_key: myproject/dev.terraform.tfstate
#   secrets: inherit

name: 'Reusable — Terraform Apply'

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment name (dev, test, prod)'
        required: true
        type: choice
        options:
          - dev
          - test
          - prod
      github_environment:
        description: 'GitHub Environment name (z approval gate)'
        required: false
        type: string
        default: ''
      working_directory:
        description: 'Ścieżka do katalogu Terraform'
        required: true
        type: string
        default: './infra'
      backend_key:
        description: 'Klucz state w backendzie'
        required: true
        type: string
      terraform_version:
        description: 'Wersja Terraform'
        required: false
        type: string
        default: 'latest'
      use_oidc:
        description: 'Use OIDC auth (true) or SPN client secret (false)'
        required: false
        type: boolean
        default: false

  workflow_call:
    inputs:
      environment:
        description: 'Target environment name (dev, test, prod)'
        required: true
        type: string
      github_environment:
        description: 'GitHub Environment name (z approval gate, np. production)'
        required: false
        type: string
        default: ''
      working_directory:
        description: 'Ścieżka do katalogu Terraform'
        required: true
        type: string
      backend_key:
        description: 'Klucz state w backendzie'
        required: true
        type: string
      terraform_version:
        description: 'Wersja Terraform'
        required: false
        type: string
        default: 'latest'
      use_oidc:
        description: 'Use OIDC auth (true) or SPN client secret (false)'
        required: false
        type: boolean
        default: false
    secrets:
      AZURE_CLIENT_ID:
        required: false
      AZURE_CLIENT_SECRET:
        required: false
      AZURE_SUBSCRIPTION_ID:
        required: false
      AZURE_TENANT_ID:
        required: false
      ARM_CLIENT_ID:
        required: false
      ARM_CLIENT_SECRET:
        required: false
      ARM_SUBSCRIPTION_ID:
        required: false
      ARM_TENANT_ID:
        required: false

permissions:
  id-token: write
  contents: read

jobs:
  test-credentials:
    name: '🔐 Test Azure Credentials'
    runs-on: ubuntu-latest
    steps:
      - name: Validate Auth Inputs
        run: |
          CLIENT_ID="${{ secrets.AZURE_CLIENT_ID || secrets.ARM_CLIENT_ID }}"
          SUBSCRIPTION_ID="${{ secrets.AZURE_SUBSCRIPTION_ID || secrets.ARM_SUBSCRIPTION_ID }}"
          TENANT_ID="${{ secrets.AZURE_TENANT_ID || secrets.ARM_TENANT_ID }}"
          CLIENT_SECRET="${{ secrets.AZURE_CLIENT_SECRET || secrets.ARM_CLIENT_SECRET }}"
          echo "TEST_ID=${vars.TEST_ID}"

          if [ -z "$CLIENT_ID" ] || [ -z "$SUBSCRIPTION_ID" ] || [ -z "$TENANT_ID" ]; then
            echo "Missing required credentials: client/subscription/tenant id"
            exit 1
          fi

          if [ "${{ inputs.use_oidc }}" = "false" ] && [ -z "$CLIENT_SECRET" ]; then
            echo "Client secret is required when use_oidc=false"
            exit 1
          fi

      - name: Azure Login Test (OIDC)
        if: ${{ inputs.use_oidc == true }}
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID || secrets.ARM_CLIENT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID || secrets.ARM_SUBSCRIPTION_ID }}
          # allow-no-subscriptions: true
          tenant-id: ${{ secrets.AZURE_TENANT_ID || secrets.ARM_TENANT_ID }}

      - name: Azure Login Test (SPN)
        if: ${{ inputs.use_oidc == false }}
        uses: azure/login@v3
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID || secrets.ARM_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET || secrets.ARM_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID || secrets.ARM_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID || secrets.ARM_TENANT_ID }}"}'
    continue-on-error: true

  apply:
    name: 'Apply (${{ inputs.environment }})'
    runs-on: ubuntu-latest
    # environment — ustawione dynamicznie; jeśli puste, brak approval gate
    environment: ${{ inputs.github_environment || inputs.environment }}
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    env:
      ARM_CLIENT_ID: "${{ secrets.AZURE_CLIENT_ID || secrets.ARM_CLIENT_ID }}"
      ARM_SUBSCRIPTION_ID: "${{ secrets.AZURE_SUBSCRIPTION_ID || secrets.ARM_SUBSCRIPTION_ID }}"
      ARM_TENANT_ID: "${{ secrets.AZURE_TENANT_ID || secrets.ARM_TENANT_ID }}"

    steps:
      - name: Checkout (caller repo)
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform_version }}
          terraform_wrapper: false

      - name: Configure Terraform Auth Env
        run: |
          if [ "${{ inputs.use_oidc }}" = "true" ]; then
            echo "ARM_USE_OIDC=true" >> "$GITHUB_ENV"
          else
            echo "ARM_CLIENT_SECRET=${{ secrets.AZURE_CLIENT_SECRET || secrets.ARM_CLIENT_SECRET }}" >> "$GITHUB_ENV"
            echo "ARM_USE_OIDC=false" >> "$GITHUB_ENV"
          fi

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ inputs.environment }}-${{ github.sha }}
          path: ${{ inputs.working_directory }}

      - name: Terraform Init
        run: terraform init -backend-config="key=${{ inputs.backend_key }}"

      - name: Terraform Apply
        run: terraform apply -auto-approve ${{ inputs.environment }}.tfplan

      - name: Apply Summary
        if: always()
        run: |
          echo "## 🚀 Terraform Apply — ${{ inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Parametr | Wartość |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| Środowisko | \`${{ inputs.environment }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Actor | \`${{ github.actor }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Data | $(date -u '+%Y-%m-%d %H:%M UTC') |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | **${{ job.status }}** |" >> $GITHUB_STEP_SUMMARY
